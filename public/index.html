<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reasoning Chat Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="chat-shell card">
        <header class="chat-header">
          <div class="toolbar-left">
            <span id="status-pill" class="status-pill idle">未发送</span>
            <span id="active-character-chip" class="toolbar-chip">无角色</span>
          </div>
          <div class="toolbar-actions">
            <button id="new-chat-button" class="ghost-button" type="button">新对话</button>
            <button id="clear-chat-button" class="ghost-button" type="button">清空</button>
            <button id="toggle-character-button" class="ghost-button" type="button">角色</button>
            <button id="toggle-settings-button" class="ghost-button" type="button">设置</button>
            <button id="toggle-debug-button" class="ghost-button" type="button">调试</button>
          </div>
        </header>

        <div id="chat-feed" class="chat-feed" aria-live="polite">
          <section class="empty-state">
            <p class="muted">开始聊天</p>
          </section>
        </div>

        <form id="chat-form" class="composer">
          <div class="composer-box">
            <textarea
              id="userMessage"
              name="userMessage"
              rows="3"
              placeholder="输入消息"
              required
            ></textarea>
            <button id="submit-button" type="submit">发送</button>
          </div>

          <details id="character-panel" class="drawer">
            <summary>角色</summary>
            <div class="drawer-body character-stack">
              <label>
                <span>当前角色</span>
                <select id="characterSelect" name="characterSelect">
                  <option value="">无角色</option>
                </select>
              </label>

              <div class="character-actions">
                <button id="new-character-button" class="ghost-button" type="button">新建</button>
                <button id="save-character-button" class="ghost-button" type="button">保存</button>
                <button
                  id="delete-character-button"
                  class="ghost-button danger-button"
                  type="button"
                >
                  删除
                </button>
              </div>

              <label>
                <span>角色名</span>
                <input
                  id="characterName"
                  name="characterName"
                  type="text"
                  placeholder="例如：温柔姐姐 / 冷静分析师"
                />
              </label>

              <label>
                <span>角色设定</span>
                <textarea
                  id="characterPrompt"
                  name="characterPrompt"
                  rows="5"
                  placeholder="例如：你是一个温柔、克制、会照顾人的中文角色，说话自然，不要跳出角色。"
                ></textarea>
              </label>
            </div>
          </details>

          <details id="settings-panel" class="drawer">
            <summary>连接设置与高级参数</summary>
            <div class="drawer-body form-grid">
              <label>
                <span>API Mode</span>
                <select id="apiMode" name="apiMode">
                  <option value="chat_completions" selected>Chat Completions</option>
                  <option value="responses">Responses API</option>
                </select>
              </label>

              <label class="span-2">
                <span>API Base URL</span>
                <input
                  id="apiBaseUrl"
                  name="apiBaseUrl"
                  type="text"
                  placeholder="例如：https://api.example.com"
                  required
                />
              </label>

              <label class="span-2">
                <span>API Key</span>
                <input
                  id="apiKey"
                  name="apiKey"
                  type="password"
                  placeholder="填你的 API Key"
                  required
                />
              </label>

              <label>
                <span>Model</span>
                <select id="model" name="model" required>
                  <option value="grok-3">grok-3</option>
                  <option value="grok-4.1">grok-4.1</option>
                  <option value="grok-4">grok-4</option>
                </select>
              </label>

              <label>
                <span>System Prompt</span>
                <textarea
                  id="systemPrompt"
                  name="systemPrompt"
                  rows="3"
                  placeholder="可选，例如：你是一个简洁的中文助手。"
                ></textarea>
              </label>
            </div>
          </details>

          <details id="debug-panel" class="drawer">
            <summary>调试信息与原始响应</summary>
            <div class="drawer-body debug-stack">
              <section>
                <h3>调试信息</h3>
                <pre id="meta" class="result empty">暂无结果</pre>
              </section>

              <section>
                <h3>思考内容</h3>
                <pre id="reasoning" class="result empty">暂无结果</pre>
              </section>

              <section>
                <h3>原始响应 JSON</h3>
                <pre id="raw" class="result empty">暂无结果</pre>
              </section>
            </div>
          </details>
        </form>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
